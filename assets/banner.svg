<svg width="100%" height="100%" viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep Space Background Base Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030305" />
      <stop offset="40%" stop-color="#0a0a14" />
      <stop offset="100%" stop-color="#020612" />
    </linearGradient>

    <!-- Flowing Gradients for Mesh Glow Simulation -->
    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.3" />
      <stop offset="60%" stop-color="#4F46E5" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0" />
    </radialGradient>
    
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.25" />
      <stop offset="60%" stop-color="#06B6D4" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0" />
    </radialGradient>

    <!-- Grid Fade Mask for Vignette Effect -->
    <radialGradient id="fade" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1" />
      <stop offset="70%" stop-color="#fff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#fff" stop-opacity="0" />
    </radialGradient>
    <mask id="fade-mask">
      <rect width="1000" height="320" fill="url(#fade)" />
    </mask>

    <!-- Grid and Dot Patterns -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>

    <pattern id="dots" x="20" y="20" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ffffff" fill-opacity="0.1" />
    </pattern>

    <!-- Data Line Gradients -->
    <linearGradient id="line-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0" />
      <stop offset="50%" stop-color="#4F46E5" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="line-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0" />
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0" />
    </linearGradient>

    <!-- Text Contrast Overlay -->
    <radialGradient id="center-dark" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#030305" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#030305" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- 1. Deep Space Base -->
  <rect width="1000" height="320" fill="url(#bg)" />

  <!-- 2. Mesh Gradients (Orbs) -->
  <circle cx="150" cy="30" r="380" fill="url(#glow-purple)" />
  <circle cx="850" cy="290" r="420" fill="url(#glow-cyan)" />
  <circle cx="450" cy="160" r="280" fill="url(#glow-purple)" opacity="0.4" />
  <circle cx="550" cy="160" r="280" fill="url(#glow-cyan)" opacity="0.3" />

  <!-- 3. Tech Grids (Masked to center) -->
  <g mask="url(#fade-mask)">
    <rect width="1000" height="320" fill="url(#grid)" />
    <rect width="1000" height="320" fill="url(#dots)" />
  </g>

  <!-- 4. Data Flow Curves -->
  <g opacity="0.7">
    <!-- Top Stream -->
    <path d="M -50 120 Q 280 20 480 160 T 1050 80" fill="none" stroke="url(#line-1)" stroke-width="1.5" />
    <path d="M -50 140 Q 230 40 460 180 T 1050 120" fill="none" stroke="url(#line-2)" stroke-width="1" opacity="0.5" />
    <path d="M -50 160 Q 180 60 440 200 T 1050 160" fill="none" stroke="url(#line-1)" stroke-width="0.5" opacity="0.2" />
    
    <!-- Bottom Stream -->
    <path d="M -50 240 Q 420 320 620 200 T 1050 240" fill="none" stroke="url(#line-2)" stroke-width="1.5" />
    <path d="M -50 260 Q 470 340 640 220 T 1050 280" fill="none" stroke="url(#line-1)" stroke-width="1" opacity="0.5" />
  </g>

  <!-- 5. Network Nodes / Constellations -->
  <g stroke="#475569" stroke-width="0.5" opacity="0.7">
    <!-- Right side node cluster -->
    <line x1="840" y1="110" x2="900" y2="70" />
    <line x1="900" y1="70" x2="950" y2="120" />
    <line x1="900" y1="70" x2="880" y2="30" />
    <line x1="950" y1="120" x2="980" y2="80" />
    
    <circle cx="840" cy="110" r="3" fill="#06B6D4" stroke="none" />
    <circle cx="900" cy="70" r="4" fill="#4F46E5" stroke="none" />
    <circle cx="950" cy="120" r="2.5" fill="#ffffff" stroke="none" />
    <circle cx="880" cy="30" r="2" fill="#06B6D4" stroke="none" />
    <circle cx="980" cy="80" r="1.5" fill="#4F46E5" stroke="none" />

    <!-- Left side node cluster -->
    <line x1="70" y1="190" x2="150" y2="230" />
    <line x1="150" y1="230" x2="110" y2="280" />
    <line x1="150" y1="230" x2="230" y2="220" />
    
    <circle cx="70" cy="190" r="2.5" fill="#4F46E5" stroke="none" />
    <circle cx="150" cy="230" r="4" fill="#06B6D4" stroke="none" />
    <circle cx="110" cy="280" r="2" fill="#ffffff" stroke="none" />
    <circle cx="230" cy="220" r="3" fill="#4F46E5" stroke="none" />
  </g>

  <!-- 6. Floating Particles -->
  <g>
    <!-- Particle 1 -->
    <circle cx="340" cy="70" r="4" fill="#06B6D4" opacity="0.3" />
    <circle cx="340" cy="70" r="1.5" fill="#ffffff" />
    <!-- Particle 2 -->
    <circle cx="680" cy="260" r="5" fill="#4F46E5" opacity="0.4" />
    <circle cx="680" cy="260" r="2" fill="#ffffff" />
    <!-- Particle 3 -->
    <circle cx="490" cy="35" r="3" fill="#06B6D4" opacity="0.3" />
    <circle cx="490" cy="35" r="1" fill="#ffffff" />
    <!-- Particle 4 -->
    <circle cx="210" cy="250" r="4" fill="#4F46E5" opacity="0.3" />
    <circle cx="210" cy="250" r="1.5" fill="#ffffff" />
    <!-- Particle 5 -->
    <circle cx="810" cy="180" r="3" fill="#ffffff" opacity="0.1" />
    <circle cx="810" cy="180" r="1" fill="#ffffff" />
  </g>

  <!-- 7. Center Dark Overlay (Improves Logo Contrast) -->
  <rect width="1000" height="320" fill="url(#center-dark)" />

  <!-- 8. THE LOGO AND TEXT (Centered perfectly) -->
  <g transform="translate(295, 90)" fill="none">
    <!-- S Logo Mark (Scaled 1.2x) -->
    <g transform="scale(1.2)">
      <path d="M 90 20 L 50 20 A 20 20 0 0 0 50 60 L 70 60 A 20 20 0 0 1 70 100 L 30 100" stroke="#4F46E5" stroke-width="20" stroke-linecap="round" />
      <path d="M 60 60 L 70 60 A 20 20 0 0 1 70 100 L 30 100" stroke="#06B6D4" stroke-width="20" stroke-linecap="round" />
    </g>
    <!-- Brand Name "Smurl" -->
    <text x="160" y="110" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="84" letter-spacing="-0.04em" text-anchor="start">
      <tspan fill="#ffffff">Sm</tspan><tspan fill="#06B6D4">url</tspan>
    </text>
  </g>

  <!-- 9. Subtitle -->
  <text x="500" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#94a3b8" letter-spacing="6" text-anchor="middle">HIGH PERFORMANCE URL SHORTENER</text>

</svg>
