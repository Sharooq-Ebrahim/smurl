<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Expired - Smurl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex min-h-screen w-full items-center justify-center px-4">
        <div class="w-full max-w-md rounded-2xl bg-white p-8 text-center shadow-lg ring-1 ring-gray-900/5">
            <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-orange-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange-600">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </div>
            <h1 class="mt-6 text-2xl font-bold tracking-tight text-gray-900">
                Link Expired
            </h1>
            <p class="mt-4 text-sm leading-6 text-gray-600">
                This short link has reached its expiration date and is no longer active.
            </p>
            <div class="mt-8">
                <a href="javascript:history.back()" class="inline-flex w-full items-center justify-center rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 transition-colors">
                    Go Back
                </a>
            </div>
            <div class="mt-6 border-t border-gray-100 pt-6">
                <p class="text-xs text-gray-400">Powered by Smurl URL Shortener</p>
            </div>
        </div>
    </div>
</body>
</html>
